<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vault Profile | Agent Identity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            background: radial-gradient(circle at center, #1e293b, #0f172a);
            color: white;
            min-height: 100vh;
            margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: flex-start;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            width: 100%;
            max-width: 420px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .avatar-ring {
            width: 90px; height: 90px;
            background: linear-gradient(45deg, #22d3ee, #0ea5e9);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 35px;
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.2);
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .leaderboard-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .leaderboard-item:hover { background: rgba(255, 255, 255, 0.08); }
        .neon-glow { text-shadow: 0 0 10px rgba(34, 211, 238, 0.5); }
    </style>
</head>
<body>

    <div class="profile-card relative">
        <a href="index.html" class="absolute top-6 left-6 text-slate-500 text-[9px] font-black uppercase tracking-[2px] hover:text-cyan-400">
            ← Secure Exit
        </a>

        <div id="rank-badge" class="absolute top-6 right-6 bg-cyan-500/10 text-cyan-400 text-[10px] font-black px-3 py-1 rounded-full border border-cyan-500/20 uppercase tracking-widest">
            Rank #--
        </div>

        <div class="avatar-ring">👤</div>
        <h1 id="prof-username" class="text-3xl font-black text-cyan-400 uppercase tracking-tighter neon-glow">AGENT</h1>
        <p id="self-tag" class="text-slate-500 text-[9px] uppercase tracking-[3px] mt-2 mb-6 italic">Verified Vault Member</p>

        <div class="grid grid-cols-2 gap-3 mb-8">
            <div class="stat-box">
                <div id="follower-count" class="text-2xl font-black text-white">0</div>
                <div class="text-[8px] text-slate-500 uppercase tracking-widest font-bold">Followers</div>
            </div>
            <div class="stat-box">
                <div id="like-count" class="text-2xl font-black text-white">0</div>
                <div class="text-[8px] text-slate-500 uppercase tracking-widest font-bold">Respect (Likes)</div>
            </div>
        </div>

        <div id="action-area" class="space-y-3 mb-10">
            <button id="follow-btn" class="w-full bg-cyan-500 hover:bg-cyan-400 text-black font-black py-4 rounded-2xl active:scale-95 transition-all text-xs uppercase tracking-widest">
                Follow Agent
            </button>
            <button id="like-btn" class="w-full bg-white/5 border border-white/10 text-white font-bold py-4 rounded-2xl active:scale-95 transition-all text-xs uppercase tracking-widest">
                Give Respect
            </button>
        </div>

        <div class="mt-8 pt-8 border-t border-white/10">
            <h3 class="text-slate-500 uppercase text-[9px] tracking-[3px] font-bold mb-5 flex justify-center items-center gap-2">
                🏆 Top Agents Leaderboard
            </h3>
            <div id="leaderboard-list" class="space-y-3">
                <div class="h-10 w-full bg-white/5 animate-pulse rounded-xl"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, runTransaction } 
            from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDnXkVUGcNkU6rH0VY0Pi98cqlZKGpqEMQ",
            authDomain: "march-special.firebaseapp.com",
            databaseURL: "https://march-special-default-rtdb.firebaseio.com",
            projectId: "march-special",
            storageBucket: "march-special.firebasestorage.app",
            messagingSenderId: "38314477914",
            appId: "1:38314477914:web:7cc8881c404f83fb8b8b63",
            measurementId: "G-BYN4V0CYS5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        const targetUser = urlParams.get('user');
        const currentUser = localStorage.getItem('vault_user');

        if (!targetUser) window.location.href = 'index.html';

        document.getElementById('prof-username').innerText = targetUser;
        const isSelf = targetUser.toLowerCase() === currentUser.toLowerCase();

        const followKey = `followed_${targetUser.toLowerCase()}`;
        const likeKey = `liked_${targetUser.toLowerCase()}`;

        // Initial States
        const followBtn = document.getElementById('follow-btn');
        const likeBtn = document.getElementById('like-btn');

        if (isSelf) {
            document.getElementById('self-tag').innerText = "THIS IS YOUR IDENTITY";
            followBtn.style.display = 'none';
            likeBtn.innerText = "VIEWING YOUR STATS";
            likeBtn.disabled = true;
            likeBtn.style.opacity = "0.4";
        } else {
            if (localStorage.getItem(followKey)) {
                followBtn.innerText = "Unfollow Agent";
                followBtn.classList.replace('bg-cyan-500', 'bg-red-500/20');
                followBtn.classList.add('text-red-500', 'border', 'border-red-500/50');
            }
            if (localStorage.getItem(likeKey)) {
                likeBtn.innerText = "Respect Given ✅";
                likeBtn.disabled = true;
                likeBtn.style.opacity = "0.5";
            }
        }

        // --- FETCH DATA & LEADERBOARD ---
        const profilesRef = ref(db, 'profiles');
        onValue(profilesRef, (snapshot) => {
            const data = snapshot.val() || {};
            const stats = data[targetUser.toLowerCase()] || { followers: 0, likes: 0 };
            
            document.getElementById('follower-count').innerText = stats.followers < 0 ? 0 : stats.followers;
            document.getElementById('like-count').innerText = stats.likes || 0;

            // Sorting for Leaderboard & Rank
            const sorted = Object.entries(data)
                .map(([username, val]) => ({ username, ...val }))
                .sort((a, b) => (b.followers || 0) - (a.followers || 0));

            // Set Rank
            const rankIndex = sorted.findIndex(a => a.username.toLowerCase() === targetUser.toLowerCase());
            document.getElementById('rank-badge').innerText = rankIndex !== -1 ? `Rank #${rankIndex + 1}` : "Rank #--";

            // Render Top 3
            const leaderboardList = document.getElementById('leaderboard-list');
            leaderboardList.innerHTML = "";
            sorted.slice(0, 3).forEach((agent, i) => {
                const crown = i === 0 ? "👑" : i === 1 ? "🥈" : "🥉";
                leaderboardList.innerHTML += `
                    <div class="leaderboard-item flex justify-between items-center p-3 rounded-xl">
                        <div class="flex items-center gap-3 text-[11px] font-black">
                            <span>${crown}</span>
                            <a href="profile.html?user=${agent.username}" class="uppercase text-cyan-400 hover:underline">${agent.username}</a>
                        </div>
                        <div class="text-[9px] text-slate-500 uppercase font-black">${agent.followers || 0} Fans</div>
                    </div>
                `;
            });
        });

        // --- FOLLOW / UNFOLLOW LOGIC ---
        followBtn.onclick = () => {
            const statsRef = ref(db, `profiles/${targetUser.toLowerCase()}`);
            runTransaction(statsRef, (current) => {
                if (!current) current = { followers: 0, likes: 0 };
                if (!localStorage.getItem(followKey)) {
                    current.followers = (current.followers || 0) + 1;
                } else {
                    current.followers = (current.followers || 0) - 1;
                }
                return current;
            }).then(() => {
                if (!localStorage.getItem(followKey)) {
                    localStorage.setItem(followKey, "true");
                    followBtn.innerText = "Unfollow Agent";
                    followBtn.classList.replace('bg-cyan-500', 'bg-red-500/20');
                    followBtn.classList.add('text-red-500', 'border', 'border-red-500/50');
                } else {
                    localStorage.removeItem(followKey);
                    followBtn.innerText = "Follow Agent";
                    followBtn.classList.remove('bg-red-500/20', 'text-red-500', 'border', 'border-red-500/50');
                    followBtn.classList.add('bg-cyan-500', 'text-black');
                }
            });
        };

        // --- LIKE LOGIC ---
        likeBtn.onclick = () => {
            if (isSelf || localStorage.getItem(likeKey)) return;
            const statsRef = ref(db, `profiles/${targetUser.toLowerCase()}`);
            runTransaction(statsRef, (current) => {
                if (!current) return { followers: 0, likes: 1 };
                current.likes = (current.likes || 0) + 1;
                return current;
            }).then(() => {
                localStorage.setItem(likeKey, "true");
                likeBtn.innerText = "Respect Given ✅";
                likeBtn.disabled = true;
                likeBtn.style.opacity = "0.5";
            });
        };
    </script>
</body>
</html>
