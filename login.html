<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Vault | Authorization</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            background: radial-gradient(circle at center, #1e293b, #0f172a);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            margin: 0;
            overflow: hidden;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 2rem;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .neon-glow {
            text-shadow: 0 0 15px rgba(34, 211, 238, 0.5);
        }

        .input-field {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: #22d3ee;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.2);
            outline: none;
        }

        /* Scanline animation for hacker vibe */
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(34, 211, 238, 0.1);
            position: absolute;
            top: 0;
            left: 0;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>
    <div class="scanline"></div>

    <div class="login-card mx-4">
        <div class="mb-8">
            <div class="w-16 h-16 bg-cyan-500/10 border border-cyan-500/30 rounded-full flex items-center justify-center mx-auto mb-4">
                <span class="text-2xl">🔒</span>
            </div>
            <h1 class="text-3xl font-black neon-glow text-cyan-400 tracking-tighter">THE VAULT.</h1>
            <p class="text-slate-400 text-[10px] uppercase tracking-[3px] mt-2">Identity Verification</p>
        </div>

        <form id="login-form" class="space-y-4">
            <div>
                <input type="text" id="username" placeholder="ENTER YOUR CODENAME" 
                    maxlength="15" required
                    class="input-field w-full px-5 py-4 rounded-xl text-center text-sm font-bold tracking-widest uppercase text-cyan-100">
            </div>
            
            <button type="submit" 
                class="w-full bg-cyan-500 hover:bg-cyan-400 text-black font-black py-4 rounded-xl transition-all active:scale-95 shadow-lg shadow-cyan-500/20 uppercase tracking-widest text-xs">
                Initialize Session
            </button>
        </form>

        <p class="mt-8 text-[9px] text-slate-500 uppercase tracking-widest leading-loose">
            By entering, you agree to <br> keep the squad's secrets safe.
        </p>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        
        // Agar pehle se login hai toh redirect karein
        if(localStorage.getItem('vault_user')) {
            window.location.href = 'index.html';
        }

        loginForm.onsubmit = (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            
            if(username.length >= 2) {
                // Username save karein
                localStorage.setItem('vault_user', username);
                
                // Button animation
                const btn = e.target.querySelector('button');
                btn.innerText = "ACCESS GRANTED...";
                btn.style.background = "#22c55e"; // Green color
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 800);
            }
        };
    </script>
</body>
</html>
