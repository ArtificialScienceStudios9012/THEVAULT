<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vault | Friends Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: white;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent; /* Mobile tap blue box remove */
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }
        .neon-text { text-shadow: 0 0 10px rgba(34, 211, 238, 0.6); }
        
        /* Custom Scrollbar for messages */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(34, 211, 238, 0.3); border-radius: 10px; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } 
            from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDnXkVUGcNkU6rH0VY0Pi98cqlZKGpqEMQ",
            authDomain: "march-special.firebaseapp.com",
            databaseURL: "https://march-special-default-rtdb.firebaseio.com",
            projectId: "march-special",
            storageBucket: "march-special.firebasestorage.app",
            messagingSenderId: "38314477914",
            appId: "1:38314477914:web:7cc8881c404f83fb8b8b63",
            measurementId: "G-BYN4V0CYS5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.db = db;
        window.dbFunctions = { collection, addDoc, onSnapshot, query, orderBy, serverTimestamp };
    </script>
</head>
<body class="p-4 md:p-12">

    <header class="max-w-6xl mx-auto mb-8">
        <h1 class="text-4xl md:text-6xl font-black neon-text text-cyan-400 tracking-tighter">THE VAULT.</h1>
        <p class="text-slate-400 text-sm mt-1">Locked memories for the squad.</p>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-4">
        
        <div class="glass-card p-5 md:p-8 md:col-span-2 flex flex-col order-2 md:order-1">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2 text-cyan-300">
                <span class="w-2 h-2 bg-cyan-400 rounded-full animate-pulse"></span>
                Live Wall
            </h2>
            
            <div id="wall-messages" class="space-y-3 h-[350px] overflow-y-auto pr-2 mb-4 custom-scrollbar">
                <p class="text-slate-500 text-center mt-10">Loading messages...</p>
            </div>

            <div class="flex flex-col gap-2">
                <input id="message-input" type="text" placeholder="Drop a roast or secret..." 
                    class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-cyan-500 text-sm">
                <button id="post-btn" class="bg-cyan-500 hover:bg-cyan-400 text-black font-black py-3 rounded-xl transition-transform active:scale-95">
                    POST MESSAGE
                </button>
            </div>
        </div>

        <div class="flex flex-col gap-4 order-1 md:order-2">
            <div class="glass-card p-6 text-center">
                <h3 class="text-slate-500 uppercase text-[10px] tracking-widest font-bold mb-1">Reunion In</h3>
                <div id="countdown" class="text-3xl font-black text-white tabular-nums">00:00:00:00</div>
            </div>

            <div class="glass-card p-6 flex items-center gap-4">
                <div class="w-12 h-12 bg-cyan-500/20 rounded-full flex items-center justify-center animate-spin-slow">
                    💿
                </div>
                <div>
                    <p class="text-md font-bold text-white">Group Vibes</p>
                    <p class="text-[10px] text-slate-500 uppercase">March Playlist 2026</p>
                </div>
            </div>
        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
