<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Vault | Squad Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: white;
            min-height: 100vh;
            margin: 0;
            overflow: hidden; 
            -webkit-tap-highlight-color: transparent;
        }

        /* --- LOADING SCREEN --- */
        #loading-overlay {
            position: fixed; inset: 0; background: #0f172a;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        .vault-dial {
            position: relative; width: 60px; height: 60px; margin-bottom: 20px;
            border: 3px solid #1e293b; border-radius: 50%;
        }

        .vault-dial::after {
            content: ''; position: absolute; top: 4px; left: 50%;
            width: 3px; height: 26px; background: #22d3ee; border-radius: 2px;
            transform-origin: bottom center; transform: translateX(-50%);
            animation: spinDial 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes spinDial {
            from { transform: translateX(-50%) rotate(0deg); }
            to { transform: translateX(-50%) rotate(360deg); }
        }

        #main-wrapper { opacity: 0; transition: opacity 0.8s ease-in; }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        @media (min-width: 768px) { .glass-card { backdrop-filter: blur(15px); } }

        .neon-text { text-shadow: 0 0 10px rgba(34, 211, 238, 0.4); }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(34, 211, 238, 0.3); border-radius: 10px; }
    </style>

    <script type="module">
        // 1. SECURITY CHECK
        if(!localStorage.getItem('vault_user')) {
            window.location.href = 'login.html';
        }

        // 2. FIREBASE CORE
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, serverTimestamp, remove, get, update } 
            from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDnXkVUGcNkU6rH0VY0Pi98cqlZKGpqEMQ",
            authDomain: "march-special.firebaseapp.com",
            databaseURL: "https://march-special-default-rtdb.firebaseio.com",
            projectId: "march-special",
            storageBucket: "march-special.firebasestorage.app",
            messagingSenderId: "38314477914",
            appId: "1:38314477914:web:7cc8881c404f83fb8b8b63",
            measurementId: "G-BYN4V0CYS5"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getDatabase(app);
        window.dbFunctions = { ref, push, onValue, serverTimestamp, remove, get, update };
    </script>
</head>
<body class="p-4 md:p-12">

    <div id="loading-overlay">
        <div class="vault-dial"></div>
        <div class="font-black tracking-[4px] text-cyan-400 text-lg uppercase">The Vault</div>
        <p class="text-slate-500 text-[8px] mt-4 uppercase tracking-[4px] animate-pulse">Syncing Encrypted Feed...</p>
    </div>

    <div id="main-wrapper" class="max-w-6xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-5xl md:text-7xl font-black neon-text text-cyan-400 tracking-tighter uppercase">The Vault.</h1>
                <p id="welcome-user" class="text-slate-400 text-[10px] uppercase tracking-widest mt-1 text-center md:text-left">Authorized Access Only</p>
            </div>
            
            <div class="flex items-center gap-3">
                <button onclick="goToMyProfile()" 
                    class="text-[10px] font-black border border-cyan-500/30 px-5 py-2.5 rounded-full text-cyan-400 hover:bg-cyan-500 hover:text-black transition-all uppercase tracking-widest">
                    My Profile
                </button>
                <button onclick="localStorage.clear(); location.reload();" 
                    class="text-[10px] font-black border border-white/10 px-5 py-2.5 rounded-full text-slate-500 hover:text-red-400 transition-all uppercase tracking-widest">
                    Logout
                </button>
            </div>
        </header>

        <main class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="glass-card p-6 md:p-8 md:col-span-2 flex flex-col shadow-2xl">
                <div class="mb-6">
                    <input id="search-bar" type="text" placeholder="🔍 Search roasts, notices or codenames..." 
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-xs focus:outline-none focus:border-cyan-500/50 text-slate-300 transition-all">
                </div>

                <div id="wall-messages" class="space-y-4 h-[400px] overflow-y-auto pr-3 mb-6 custom-scrollbar">
                    <div class="h-12 w-full bg-white/5 animate-pulse rounded-xl"></div>
                    <div class="h-12 w-full bg-white/5 animate-pulse rounded-xl opacity-50"></div>
                </div>

                <div class="mt-auto">
                    <div id="reply-indicator" class="hidden text-[9px] text-cyan-400 bg-cyan-400/5 p-2 rounded-t-xl border-t border-x border-white/10 uppercase tracking-[2px] flex justify-between items-center">
                        <span id="reply-text">Replying...</span>
                        <button onclick="window.cancelReply()" class="text-red-500 font-bold px-2 text-sm">×</button>
                    </div>

                    <div class="flex flex-col gap-2 p-1 bg-white/5 rounded-2xl border border-white/10 focus-within:border-cyan-500/30 transition-all">
                        <textarea id="message-input" placeholder="Type a notice or roast (Shift+Enter for new line)..." 
                            class="w-full bg-transparent px-5 py-4 focus:outline-none text-sm text-cyan-50 resize-none h-28 custom-scrollbar"></textarea>
                        
                        <button id="post-btn" class="bg-cyan-500 hover:bg-cyan-400 text-black font-black py-4 rounded-xl transition-all active:scale-95 shadow-lg shadow-cyan-500/20 uppercase tracking-widest text-xs">
                            Transmit Data
                        </button>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-6">
                <div class="glass-card p-8 text-center border-t-2 border-t-cyan-500/50">
                    <h3 class="text-slate-500 uppercase text-[9px] tracking-[3px] font-bold mb-3">Reunion Countdown</h3>
                    <div id="countdown" class="text-4xl font-black text-white tabular-nums tracking-tighter">00:00:00:00</div>
                </div>

                <div class="glass-card p-6 flex items-center gap-5">
                    <div class="w-12 h-12 bg-cyan-500/10 rounded-full flex items-center justify-center animate-spin">💿</div>
                    <div>
                        <p class="text-md font-bold text-white">Squad Vibe</p>
                        <p class="text-[9px] text-cyan-400/60 uppercase tracking-widest mt-1 italic">Vibe: Maximum Roast</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Navigation Logic
        function goToMyProfile() {
            const user = localStorage.getItem('vault_user');
            if(user) window.location.href = `profile.html?user=${user}`;
        }

        window.addEventListener('load', () => {
            const user = localStorage.getItem('vault_user') || 'Agent';
            document.getElementById('welcome-user').innerText = `Authorized Access: ${user}`;
            
            setTimeout(() => {
                document.getElementById('loading-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading-overlay').style.visibility = 'hidden';
                    document.getElementById('main-wrapper').style.opacity = '1';
                    document.body.style.overflow = 'auto';
                }, 500);
            }, 2000);
        });
    </script>
    
    <script src="script.js"></script>
</body>
</html>
